run:
  name: first_sagemaker_run
  output_dir: outputs
  seed: 42

contracts:
  # Keep model_manifest + feature_catalog in repo/local inputs for first run.
  model_manifest_path: inputs/model_manifest.json
  feature_catalog_path: inputs/feature_catalog.parquet
  # This file is generated by `pipelines.build_prediction_dump`.
  prediction_dump_path: outputs/predictions/validation_predictions.parquet

prediction_dump_builder:
  # Refer Two Tower train config for source validation path + feature columns.
  two_tower_train_config_path: ../Two_tower/configs/train.yaml
  output_path: outputs/predictions/validation_predictions.parquet
  # Use max_rows for first run/smoke test. Set 0 for full validation data.
  max_rows: 300000
  batch_rows: 50000

pipeline:
  run_permutation_importance: true
  permutation_mode: two_tower_true_rescore  # options: two_tower_true_rescore | surrogate
  two_tower:
    src_path: ../Two_tower/src
    artifacts_base: s3://mobavenue-simplismart-aws-s3-apse-sg/rtb/data/two_tower_ml/3_Client/
    client_id_col: client_bundle_id
    device: cuda
    batch_size: 2048
  run_residual_dataset: true
  run_interaction_mining: false
  run_cross_candidates: false

metrics:
  primary: auc
  secondary:
    - logloss
    - ndcg

